name: Moderate Profanity

on:
  issue_comment:
    types: [created, edited]
  issues:
    types: [opened, edited, reopened]
  pull_request:
    types: [opened, edited, reopened]

permissions:
  issues: write
  pull-requests: write

jobs:
  filter-profanity:
    runs-on: ubuntu-latest
    steps:
      - name: Filter bad words
        uses: IEvangelist/profanity-filter@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          replacement-strategy: Emoji
   - Внизу страницы выберите **Commit directly to the `main` branch** и нажмите `Commit new file`.

3. **Дождитесь, пока GitHub проанализирует файл** (около 10-30 секунд). Затем перейдите во вкладку `Actions`. Вы должны увидеть **новый успешный запуск** (зелёная галочка) для workflow `Moderate Profanity`. Если запуск снова красный — нажмите на него и скопируйте сюда полный текст ошибки.

4. **После успешного запуска** оставьте новый тестовый комментарий с матом через Giscus. Обновите страницу через минуту — слово должно замениться на смайлик.

### ⚠️ Если ничего не меняется

Возможно, ваш репозиторий для комментариев — это **`uinadip/.github`**? Репозитории, начинающиеся с точки (`.github`), имеют особое назначение (организационные файлы сообщества) и **GitHub Actions в них может не работать для комментариев в других репозиториях**. Уточните:
- **В каком именно репозитории вы создали workflow?** (Полное имя, например, `uinadip/.github` или `uinadip/blog-comments` или другой)
- **Какой репозиторий вы указали в настройках Giscus?** (Тот, куда Giscus сохраняет комментарии)

Если эти два репозитория — разные, то workflow нужно создавать **в том репозитории, где хранятся комментарии**, а не в `.github`.

Пожалуйста, ответьте на эти вопросы и/или покажите скриншот содержимого файла `comment-moderation.yml` сейчас. Тогда я смогу точно определить проблему.