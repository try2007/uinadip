name: Moderate Profanity

on:
  discussion_comment:
    types: [created, edited]

permissions:
  discussions: write

jobs:
  moderate:
    runs-on: ubuntu-latest
    steps:
      - name: Check and censor comment
        uses: ktmud/comment-censor-action@master
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          bad_words: "fuck,shit,damn,bitch,хуй,пизда,бля,ебать,мудак,сука"
          censor_char: "*"
          # Указываем, что работаем с обсуждением
          discussion_comment: true
