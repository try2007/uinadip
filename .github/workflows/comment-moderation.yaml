name: Moderate Profanity

on:
  discussion_comment:
    types: [created, edited]

permissions:
  discussions: write

jobs:
  censor:
    runs-on: ubuntu-latest
    steps:
      - name: Censor bad words
        uses: actions/github-script@v7
        with:
          script: |
            const badWords = ['fuck', 'shit', 'damn', 'bitch', 'хуй', 'пизда', 'бля', 'ебать', 'мудак', 'сука'];
            
            const comment = context.payload.comment;
            const body = comment.body;
            let censoredBody = body;
            let wasCensored = false;
            
            for (const word of badWords) {
              const regex = new RegExp(word, 'gi');
              if (regex.test(censoredBody)) {
                wasCensored = true;
                censoredBody = censoredBody.replace(regex, '***');
              }
            }
            
            if (wasCensored && body !== censoredBody) {
              // Правильный API для обновления комментария в Discussion
              await github.graphql(`
                mutation UpdateDiscussionComment($input: UpdateDiscussionCommentInput!) {
                  updateDiscussionComment(input: $input) {
                    comment {
                      body
                    }
                  }
                }
              `, {
                input: {
                  commentId: comment.node_id,
                  body: censoredBody
                }
              });
            }
