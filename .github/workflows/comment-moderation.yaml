name: Moderate Profanity

# ✅ Только эти три типа событий поддерживаются Action'ом
on:
  issue_comment:
    types: [created, edited]
  issues:
    types: [opened, edited, reopened]
  pull_request:
    types: [opened, edited, reopened]

# ✅ Права строго как в документации
permissions:
  issues: write
  pull-requests: write

jobs:
  filter:
    runs-on: ubuntu-latest
    steps:
      - uses: IEvangelist/profanity-filter@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          replacement-strategy: Asterisk
