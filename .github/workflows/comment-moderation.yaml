on:
  discussion_comment:
    types: [created, edited]

jobs:
  moderate:
    runs-on: ubuntu-latest
    permissions:
      discussions: write
    steps:
      - name: Moderate profanity in comments
        uses: jglovier/discussions-moderator-action@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          bad-words: "fuck,shit,damn,хуй,пизда,бля,ебать"
          replacement-text: "***"
