name: Moderate Profanity

on:
  discussion_comment:
    types: [created, edited]

# Убираем permissions, так как будем использовать PAT
jobs:
  censor:
    runs-on: ubuntu-latest
    steps:
      - name: Censor bad words
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const badWords = ['fuck', 'shit', 'damn', 'bitch', 'хуй', 'пизда', 'бля', 'ебать', 'мудак', 'сука'];
            
            const comment = context.payload.comment;
            const body = comment.body;
            let censoredBody = body;
            let wasCensored = false;
            
            for (const word of badWords) {
              const regex = new RegExp(word, 'gi');
              if (regex.test(censoredBody)) {
                wasCensored = true;
                censoredBody = censoredBody.replace(regex, '***');
              }
            }
            
            if (wasCensored && body !== censoredBody) {
              // GraphQL запрос для обновления комментария
              const query = `
                mutation($input: UpdateDiscussionCommentInput!) {
                  updateDiscussionComment(input: $input) {
                    comment {
                      body
                    }
                  }
                }
              `;
              
              const variables = {
                input: {
                  commentId: comment.node_id,
                  body: censoredBody
                }
              };
              
              await github.graphql(query, variables);
            }
